<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2A工作流平台</title>
  <style>
    #app-reset-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 9999;
      display: none;
    }
    #app-reset-panel p {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    #app-reset-panel button {
      background: #f56c6c;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    #app-reset-panel button:hover {
      background: #e64242;
    }
    /* 显示重置面板的样式 */
    #app-reset-panel.show {
      display: block;
    }
  </style>
  <script>
    // API请求拦截器
    (function() {
      console.log('初始化API请求拦截器...');
      
      // 拦截XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, async, user, password) {
        if (typeof url === 'string' && url.match(/\/api\/.*\.js$/)) {
          console.warn(`拦截到对API JS文件的XMLHttpRequest请求: ${url}`);
          this.__intercepted = true;
          url = '/api/__fake_js_file__';
        }
        return originalOpen.call(this, method, url, async, user, password);
      };

      const originalSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function() {
        if (this.__intercepted) {
          setTimeout(() => {
            Object.defineProperty(this, 'status', { value: 200 });
            Object.defineProperty(this, 'responseText', { value: '{}' });
            Object.defineProperty(this, 'response', { value: '{}' });
            Object.defineProperty(this, 'readyState', { value: 4 });
            
            if (this.onreadystatechange) {
              this.onreadystatechange(new Event('readystatechange'));
            }
            
            if (this.onload) {
              this.onload(new Event('load'));
            }
          }, 10);
          return;
        }
        return originalSend.apply(this, arguments);
      };

      // 拦截fetch请求
      const originalFetch = window.fetch;
      window.fetch = function(input, init) {
        if (typeof input === 'string' && input.match(/\/api\/.*\.js$/)) {
          console.warn(`拦截到对API JS文件的fetch请求: ${input}`);
          // 返回空对象
          return Promise.resolve(new Response(
            '{}',
            {
              status: 200,
              headers: { 'Content-Type': 'application/javascript' }
            }
          ));
        }
        return originalFetch.apply(this, arguments);
      };
    })();
  </script>
  <script>
    // 热修复程序 - 用于解决认证和API加载问题
    (function() {
      console.log('初始化系统热修复脚本...');
      
      // 在DOM加载完成后执行
      document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM已加载，开始热修复...');
        
        // 本地存储状态修复
        const isAuthenticated = localStorage.getItem('authenticated');
        const token = localStorage.getItem('token');
        
        // 如果本地存储混乱，进行重置
        if ((isAuthenticated === 'true' && !token) || (!isAuthenticated && token)) {
          console.warn('发现本地存储状态不一致，进行重置');
          localStorage.removeItem('authenticated');
          localStorage.removeItem('token');
        }
        
        // 预设API模块
        window.ApiModules = {
          agent: {},
          workflow: {},
          session: {},
          task: {},
          a2a: {},
          user: {
            login: function(credentials) {
              console.log('调用全局API模块 - 用户登录:', credentials);
              return fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(credentials)
              })
              .then(response => response.json())
              .then(data => {
                if (data.token) {
                  localStorage.setItem('token', data.token);
                  localStorage.setItem('authenticated', 'true');
                  return { success: true, token: data.token };
                }
                return { success: false, error: '登录失败' };
              });
            },
            register: function(userData) {
              console.log('调用全局API模块 - 用户注册:', userData);
              return fetch('/api/users/register/', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
              })
              .then(response => response.json());
            },
            current: function() {
              console.log('调用全局API模块 - 获取当前用户');
              const token = localStorage.getItem('token');
              const headers = {};
              if (token) {
                headers['Authorization'] = `Token ${token}`;
              }
              return fetch('/api/users/current/', {
                headers: headers
              })
              .then(response => response.json());
            }
          },
          auth: {
            repairAuthentication: function() {
              console.log('执行认证修复');
              // 检查本地存储状态
              const token = localStorage.getItem('token');
              const isAuthenticated = localStorage.getItem('authenticated') === 'true';
              
              // 确保状态一致
              if (isAuthenticated && !token) {
                localStorage.removeItem('authenticated');
              } else if (!isAuthenticated && token) {
                localStorage.setItem('authenticated', 'true');
              }
              
              return Promise.resolve({
                success: true,
                isAuthenticated: localStorage.getItem('authenticated') === 'true',
                hasToken: !!localStorage.getItem('token')
              });
            },
            clearAllAuthData: function() {
              console.log('清理所有认证数据');
              localStorage.removeItem('authenticated');
              localStorage.removeItem('token');
              return Promise.resolve({ success: true });
            }
          }
        };
        
        console.log('热修复完成');
        
        // 添加重置面板并设置计时器
        setTimeout(function() {
          const appElement = document.getElementById('app');
          // 检查是否有内容渲染
          if (appElement && (!appElement.children || appElement.children.length === 0)) {
            console.warn('检测到应用可能白屏，显示重置面板');
            showResetPanel();
          } else {
            console.log('应用内容已渲染，无需显示重置面板');
          }
        }, 3000); // 3秒后检查
      });
      
      // 创建重置面板
      function showResetPanel() {
        const panel = document.createElement('div');
        panel.id = 'app-reset-panel';
        panel.className = 'show';
        panel.innerHTML = `
          <p>检测到应用可能未正确加载，是否需要重置？</p>
          <button id="reset-app-btn">重置应用</button>
        `;
        document.body.appendChild(panel);
        
        // 添加重置按钮点击事件
        document.getElementById('reset-app-btn').addEventListener('click', function() {
          // 清除所有本地存储
          localStorage.clear();
          sessionStorage.clear();
          
          // 重新加载页面
          window.location.href = '/';
        });
      }
    })();
  </script>
  <script type="module" crossorigin src="/assets/main.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/style.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
