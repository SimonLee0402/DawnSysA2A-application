<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>A2A工作流平台</title>
    {% load static %}
    {% if debug %}
    <!-- 开发环境：不加载任何静态资源，由Vite开发服务器提供 -->
    {% else %}
    <!-- 生产环境：加载编译后的CSS -->
    <link rel="stylesheet" href="{% static 'vue/assets/main.css' %}">
    {% endif %}
    <style>
        /* 初始加载状态样式 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #app {
            height: 100vh;
            width: 100%;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #409EFF;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(64, 158, 255, 0.3);
            border-radius: 50%;
            border-top-color: #409EFF;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 应用白屏检测和重置按钮 */
        .app-error-detector {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #f56c6c;
            color: white;
            padding: 10px 15px;
            border-radius: 4px;
            display: none;
            z-index: 9999;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .app-error-detector button {
            background: white;
            color: #f56c6c;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
    <script>
        // 全局错误捕获和处理
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('全局错误:', message, error);
            // 显示错误提示和重置按钮
            setTimeout(function() {
                var errorDetector = document.getElementById('app-error-detector');
                if (errorDetector) {
                    errorDetector.style.display = 'block';
                }
            }, 5000); // 5秒后检查
            
            return false; // 允许默认处理继续
        };
        
        // 白屏检测
        setTimeout(function() {
            var app = document.getElementById('app');
            if (app && (app.childElementCount === 0 || 
                (app.childElementCount === 1 && app.firstElementChild.classList.contains('loading-container')))) {
                console.warn('检测到应用可能白屏');
                var errorDetector = document.getElementById('app-error-detector');
                if (errorDetector) {
                    errorDetector.style.display = 'block';
                }
            }
        }, 10000); // 10秒后检查
        
        // 重置应用函数
        function resetApp() {
            console.log('重置应用...');
            // 清除缓存
            localStorage.clear();
            sessionStorage.clear();
            // 清除cookie
            document.cookie.split(";").forEach(function(c) {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            // 重新加载页面
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <div id="app">
        <!-- 初始加载状态 -->
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p style="margin-top: 20px;">正在加载应用...</p>
        </div>
    </div>
    
    <!-- 应用白屏检测器和重置按钮 -->
    <div id="app-error-detector" class="app-error-detector">
        应用加载异常 <button onclick="resetApp()">重置应用</button>
    </div>

    <!-- 用户认证数据：模板逻辑部分 -->
    {% if request.user.is_authenticated %}
    <script>
        // 认证用户数据
        var userData = {
            isAuthenticated: true,
            username: "{{ request.user.username }}",
            userId: "{{ request.user.id }}",
            email: "{{ request.user.email }}"
        };
    </script>
    {% else %}
    <script>
        // 未认证用户数据
        var userData = {
            isAuthenticated: false
        };
    </script>
    {% endif %}
    
    <!-- 设置全局用户数据 -->
    <script>
        // 设置全局用户数据
        window.USER_DATA = userData;
    </script>
    
    <!-- 认证修复脚本 - 在应用加载前先执行 -->
    {% if debug %}
    <script type="module">
        // 导入认证修复模块（开发环境）
        import { repairAuthentication } from "//localhost:3000/api/auth-repair.js";
        
        // 立即执行认证修复
        try {
            console.log('执行预加载认证修复...');
            repairAuthentication()
                .then(result => console.log('预加载认证修复完成:', result))
                .catch(err => console.error('预加载认证修复失败:', err));
        } catch (e) {
            console.error('执行认证修复时出错:', e);
        }
    </script>
    {% else %}
    <script type="module">
        // 导入认证修复模块（生产环境）
        import { repairAuthentication } from "/api/auth-repair.js";
        
        // 立即执行认证修复
        try {
            console.log('执行预加载认证修复...');
            repairAuthentication()
                .then(result => console.log('预加载认证修复完成:', result))
                .catch(err => console.error('预加载认证修复失败:', err));
        } catch (e) {
            console.error('执行认证修复时出错:', e);
        }
    </script>
    {% endif %}

    {% if debug %}
    <!-- 开发环境：从Vite开发服务器加载 -->
    <script type="module">
        // 导入Vite HMR客户端
        import "//localhost:3000/@vite/client"
        // 导入入口文件
        import "//localhost:3000/main.js"
    </script>
    {% else %}
    <!-- 生产环境：加载编译后的JS -->
    <script type="module" src="{% static 'vue/assets/main.js' %}"></script>
    {% endif %}
</body>
</html>
